<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
  </head>
  <body>
    <div id="bg-overlay" aria-hidden="true"></div>

    <header>
      <h1>Weather App</h1>
    </header>

    <main id="content">
      <form id="search-form" role="search">
        <label for="search-input" class="visually-hidden"
          >Search for a city</label
        >
        <input
          type="text"
          placeholder="e.g. Vilnius"
          id="search-input"
          required
        />
        <button type="submit">Search</button>
      </form>

      <div id="controls">
        <button id="unit-toggle" aria-label="Toggle temperature units">
          Display °F
        </button>
      </div>

      <div id="status-container" aria-live="polite"></div>

      <div id="weather-container"></div>
    </main>

    <template id="weather-card-template">
      <article class="weather-card">
        <div class="weather-icon-container" aria-hidden="true">
          <i data-lucide="" class="weather-icon"></i>
        </div>
        <h2 class="display-city"></h2>
        <p class="display-conditions"></p>
        <div class="temp-container"></div>
        <p class="display-description"></p>
      </article>
    </template>

    <template id="loading-template">
      <div class="loader" role="status">
        <div class="spinner"></div>
        <p>Fetching weather...</p>
      </div>
    </template>
  </body>
</html>
