<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
  </head>
  <body>
    <h1>Weather App</h1>
    <div id="content">
      <form id="search-form">
        <input
          type="text"
          placeholder="e.g. Vilnius"
          id="search-input"
          required
        />
        <button type="submit">Search</button>
      </form>

      <div id="weather-container"></div>
    </div>

    <template id="weather-card-template">
      <div class="weather-card">
        <h2 class="display-city"></h2>
        <p class="display-conditions"></p>
        <div class="temp-container"><span class="display-temp"></span>°C</div>
        <p class="display-description"></p>
      </div>
    </template>
  </body>
</html>
