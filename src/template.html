<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
  </head>
  <body>
    <div id="bg-overlay"></div>

    <h1>Weather App</h1>
    <div id="content">
      <form id="search-form">
        <input
          type="text"
          placeholder="e.g. Vilnius"
          id="search-input"
          required
        />
        <button type="submit">Search</button>
      </form>

      <div id="controls">
        <button id="unit-toggle" data-unit="metric">Display °F</button>
      </div>

      <div id="weather-container"></div>
      <div id="status-container"></div>
    </div>

    <template id="weather-card-template">
      <div class="weather-card">
        <div class="weather-icon-container">
          <i data-lucide="" class="weather-icon"></i>
        </div>
        <h2 class="display-city"></h2>
        <p class="display-conditions"></p>
        <div class="temp-container"></div>
        <p class="display-description"></p>
      </div>
    </template>

    <template id="loading-template">
      <div class="loader">
        <div class="spinner"></div>
        <p>Fetching weather...</p>
      </div>
    </template>
  </body>
</html>
